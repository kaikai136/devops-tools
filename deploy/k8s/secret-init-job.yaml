apiVersion: batch/v1
kind: Job
metadata:
  name: django-secret-init
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: init-secret
          image: devops-tools:latest
          command:
            - sh
            - -c
            - |
              # 检查是否已有 secret key 文件
              if [ -f /app/data/django-secret-key ]; then
                echo "Secret key already exists"
                exit 0
              fi
              # 生成新密钥并保存
              python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())" > /app/data/django-secret-key
              echo "Secret key generated and saved"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: devops-tools-data-pvc
      restartPolicy: Never
  backoffLimit: 3