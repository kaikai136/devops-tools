apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacd
  namespace: default
  labels:
    app: devops-tools
    component: guacd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-tools
      component: guacd
  template:
    metadata:
      labels:
        app: devops-tools
        component: guacd
    spec:
      containers:
        - name: guacd
          image: guacamole/guacd:1.5.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: guacd
              containerPort: 4822
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          livenessProbe:
            tcpSocket:
              port: guacd
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: guacd
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-tools-app
  namespace: default
  labels:
    app: devops-tools
    component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-tools
      component: app
  template:
    metadata:
      labels:
        app: devops-tools
        component: app
    spec:
      containers:
        - name: app
          image: devops-tools:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          volumeMounts:
            - name: app-config
              mountPath: /app/config/app.conf
              subPath: app.conf
              readOnly: true
            - name: data
              mountPath: /app/data
            - name: media
              mountPath: /app/media
            - name: recordings
              mountPath: /app/rdp_recordings
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: app-config
          configMap:
            name: devops-tools-config
            items:
              - key: app.conf
                path: app.conf
        - name: data
          persistentVolumeClaim:
            claimName: devops-tools-data-pvc
        - name: media
          persistentVolumeClaim:
            claimName: devops-tools-media-pvc
        - name: recordings
          persistentVolumeClaim:
            claimName: devops-tools-recordings-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-tools-ssh-gateway
  namespace: default
  labels:
    app: devops-tools
    component: ssh-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-tools
      component: ssh-gateway
  template:
    metadata:
      labels:
        app: devops-tools
        component: ssh-gateway
    spec:
      containers:
        - name: ssh-gateway
          image: devops-tools:latest
          imagePullPolicy: IfNotPresent
          args: ["python", "manage.py", "run_ssh_gateway"]
          ports:
            - name: ssh
              containerPort: 2222
              protocol: TCP
          volumeMounts:
            - name: app-config
              mountPath: /app/config/app.conf
              subPath: app.conf
              readOnly: true
            - name: data
              mountPath: /app/data
            - name: media
              mountPath: /app/media
            - name: recordings
              mountPath: /app/rdp_recordings
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          livenessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: app-config
          configMap:
            name: devops-tools-config
            items:
              - key: app.conf
                path: app.conf
        - name: data
          persistentVolumeClaim:
            claimName: devops-tools-data-pvc
        - name: media
          persistentVolumeClaim:
            claimName: devops-tools-media-pvc
        - name: recordings
          persistentVolumeClaim:
            claimName: devops-tools-recordings-pvc
