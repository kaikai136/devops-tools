apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-tools-ssh-gateway
  namespace: default
  labels:
    app: devops-tools
    component: ssh-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: devops-tools
      component: ssh-gateway
  template:
    metadata:
      labels:
        app: devops-tools
        component: ssh-gateway
    spec:
      # Co-locate with the app on the stable node (see deployment-app.yaml).
      # nodeSelector:
      #   kubernetes.io/hostname: k8svip-161
      # tolerations:
      #   - key: node-role.kubernetes.io/control-plane
      #     operator: Exists
      #     effect: NoSchedule
      #   - key: node-role.kubernetes.io/master
      #     operator: Exists
      #     effect: NoSchedule
      imagePullSecrets:
        - name: my-harbor
      initContainers:
        # Wait until the app has finished migrations and is serving, so the
        # gateway never races the DB or starts against an un-migrated schema.
        - name: wait-for-app
          image: docker.1ms.run/busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for devops-tools-app health endpoint..."
              i=0
              until wget -q -T 3 -O /dev/null "http://devops-tools-app:8001/api/health/"; do
                i=$((i + 1))
                if [ "$i" -ge 120 ]; then
                  echo "Timed out waiting for devops-tools-app." >&2
                  exit 1
                fi
                sleep 3
              done
              echo "App is healthy; starting SSH gateway."
      containers:
        - name: ssh-gateway
          image: harbor.xunsiya.com:7891/devops/devops-tools:latest
          imagePullPolicy: IfNotPresent
          args: ["python", "manage.py", "run_ssh_gateway"]
          # DB is already migrated by the app pod; static files are baked in.
          env:
            - name: RUN_MIGRATE
              value: "0"
            - name: RUN_COLLECTSTATIC
              value: "0"


            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP

            - name: DJANGO_CSRF_TRUSTED_ORIGINS
              value: "http://$(NODE_IP):300271"

            - name: SSH_GATEWAY_PUBLIC_HOST
              value: "$(NODE_IP)"



          ports:
            - name: ssh
              containerPort: 2222
              protocol: TCP
          volumeMounts:
            - name: runtime
              mountPath: /app
            - name: app-config
              mountPath: /app/config/app.conf
              subPath: app.conf
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:

        # - name: runtime
        #   hostPath:
        #     path: /data/devops-tools
        #     type: DirectoryOrCreate

        - name: runtime
          persistentVolumeClaim:
            claimName: devops-tools-runtime-pvc
        - name: app-config
          configMap:
            name: devops-tools-config
            items:
              - key: app.conf
                path: app.conf
