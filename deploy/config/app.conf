# Safe defaults for local, test, and controlled intranet deployments.
# Production deployments should restrict hosts/origins and keep private overrides out of Git.
TZ=Asia/Shanghai

# Leave empty to generate and persist a unique key in ../data/django-secret-key.
DJANGO_SECRET_KEY=
DJANGO_SECRET_KEY_FILE=/app/data/django-secret-key
DJANGO_DEBUG=0
DJANGO_ALLOWED_HOSTS=*
DJANGO_CSRF_TRUSTED_ORIGINS=
DJANGO_CORS_ALLOW_ALL_ORIGINS=0
DJANGO_CORS_ALLOWED_ORIGINS=
DJANGO_MEDIA_ROOT=/app/media
DJANGO_SERVE_MEDIA_FILES=1

# Choose mysql or sqlite. MySQL connects to the remote host configured below;
# Docker Compose does not start a local MySQL service.
# Change MySQL host, user, and password before production use.
DATABASE_ENGINE=mysql
DATABASE_HOST=mysql.example.com
DATABASE_PORT=3306
DATABASE_NAME=devops_tools
DATABASE_USER=devops_tools
DATABASE_PASSWORD=devops-tools-password

# Used only when DATABASE_ENGINE=sqlite.
DJANGO_DB_PATH=/app/data/db.sqlite3

GUACD_HOST=guacd
GUACD_PORT=4822

RDP_RECORDING_ROOT=/app/recordings
RDP_RECORDING_RETENTION_DAYS=30
RDP_RECORDING_DEFAULT_ENABLED=0

SSH_GATEWAY_ENABLED=1
SSH_GATEWAY_BIND_HOST=0.0.0.0
SSH_GATEWAY_PORT=2222
SSH_GATEWAY_PUBLIC_HOST=
SSH_GATEWAY_PUBLIC_PORT=2222
SSH_GATEWAY_HOST_KEY_PATH=/app/data/ssh-gateway-host-key

BULK_EXECUTION_MAX_TARGETS=50
BULK_EXECUTION_FORKS=10
BULK_EXECUTION_TIMEOUT_SECONDS=300
BULK_EXECUTION_RUN_ASYNC=1
