services:
  guacd:
    image: guacamole/guacd:1.5.5
    container_name: ${GUACD_CONTAINER_NAME:-devops-tools-guacd}
    restart: unless-stopped
    init: true

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-devops-tools:latest}
    container_name: ${CONTAINER_NAME:-devops-tools}
    restart: unless-stopped
    init: true
    ports:
      - "${APP_PORT:-8001}:8001"
    environment:
      TZ: Asia/Shanghai
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-*}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:-}"
      DJANGO_CORS_ALLOW_ALL_ORIGINS: "${DJANGO_CORS_ALLOW_ALL_ORIGINS:-0}"
      DJANGO_DB_PATH: /app/data/db.sqlite3
      DJANGO_MEDIA_ROOT: /app/media
      DJANGO_SERVE_MEDIA_FILES: "1"
      GUACD_HOST: "${GUACD_HOST:-guacd}"
      GUACD_PORT: "${GUACD_PORT:-4822}"
      RDP_RECORDING_ROOT: /app/rdp_recordings
      RDP_RECORDING_RETENTION_DAYS: "${RDP_RECORDING_RETENTION_DAYS:-30}"
      RDP_RECORDING_DEFAULT_ENABLED: "${RDP_RECORDING_DEFAULT_ENABLED:-0}"
      SSH_GATEWAY_ENABLED: "${SSH_GATEWAY_ENABLED:-1}"
      SSH_GATEWAY_BIND_HOST: "${SSH_GATEWAY_BIND_HOST:-0.0.0.0}"
      SSH_GATEWAY_PORT: "${SSH_GATEWAY_PORT:-2222}"
      SSH_GATEWAY_PUBLIC_HOST: "${SSH_GATEWAY_PUBLIC_HOST:-}"
      SSH_GATEWAY_PUBLIC_PORT: "${SSH_GATEWAY_PUBLIC_PORT:-2222}"
      SSH_GATEWAY_HOST_KEY_PATH: /app/data/ssh-gateway-host-key
    depends_on:
      - guacd
    volumes:
      - ./data:/app/data
      - ./media:/app/media
      - rdp_recordings:/app/rdp_recordings
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/api/health/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ssh-gateway:
    image: ${IMAGE_NAME:-devops-tools:latest}
    container_name: ${SSH_GATEWAY_CONTAINER_NAME:-devops-tools-ssh-gateway}
    restart: unless-stopped
    init: true
    command: ["python", "manage.py", "run_ssh_gateway"]
    ports:
      - "${SSH_GATEWAY_PUBLIC_PORT:-2222}:${SSH_GATEWAY_PORT:-2222}"
    environment:
      TZ: Asia/Shanghai
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-*}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:-}"
      DJANGO_CORS_ALLOW_ALL_ORIGINS: "${DJANGO_CORS_ALLOW_ALL_ORIGINS:-0}"
      DJANGO_DB_PATH: /app/data/db.sqlite3
      DJANGO_MEDIA_ROOT: /app/media
      DJANGO_SERVE_MEDIA_FILES: "1"
      GUACD_HOST: "${GUACD_HOST:-guacd}"
      GUACD_PORT: "${GUACD_PORT:-4822}"
      RDP_RECORDING_ROOT: /app/rdp_recordings
      RDP_RECORDING_RETENTION_DAYS: "${RDP_RECORDING_RETENTION_DAYS:-30}"
      RDP_RECORDING_DEFAULT_ENABLED: "${RDP_RECORDING_DEFAULT_ENABLED:-0}"
      SSH_GATEWAY_ENABLED: "${SSH_GATEWAY_ENABLED:-1}"
      SSH_GATEWAY_BIND_HOST: "${SSH_GATEWAY_BIND_HOST:-0.0.0.0}"
      SSH_GATEWAY_PORT: "${SSH_GATEWAY_PORT:-2222}"
      SSH_GATEWAY_PUBLIC_HOST: "${SSH_GATEWAY_PUBLIC_HOST:-}"
      SSH_GATEWAY_PUBLIC_PORT: "${SSH_GATEWAY_PUBLIC_PORT:-2222}"
      SSH_GATEWAY_HOST_KEY_PATH: /app/data/ssh-gateway-host-key
    depends_on:
      - app
    volumes:
      - ./data:/app/data
      - ./media:/app/media
      - rdp_recordings:/app/rdp_recordings

volumes:
  rdp_recordings:
