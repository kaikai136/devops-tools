services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-devops-tools:latest}
    container_name: ${CONTAINER_NAME:-devops-tools}
    restart: unless-stopped
    init: true
    ports:
      - "${APP_PORT:-8001}:8001"
    environment:
      TZ: Asia/Shanghai
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env or environment}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-172.16.0.99,localhost,127.0.0.1}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:-http://172.16.0.99:8001,http://localhost:8001,http://127.0.0.1:8001}"
      DJANGO_CORS_ALLOW_ALL_ORIGINS: "${DJANGO_CORS_ALLOW_ALL_ORIGINS:-0}"
      DJANGO_DB_PATH: /app/data/db.sqlite3
      DJANGO_MEDIA_ROOT: /app/media
      DJANGO_SERVE_MEDIA_FILES: "1"
    volumes:
      - ./data:/app/data
      - ./media:/app/media
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/api/health/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
